name: liwanglai
description: "礼往来：人情往来礼簿 Flutter MVP."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # A-7 状态管理
  flutter_riverpod: ^2.6.1

  # A-6 路由
  go_router: ^14.6.0

  # A-1 持久化
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0
  shared_preferences: ^2.3.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

  # A-3 隐私锁
  local_auth: ^2.3.0

  # A-4 本地通知
  flutter_local_notifications: ^17.2.4
  permission_handler: ^11.3.1
  timezone: ^0.9.4

  # A-2 导出
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.1.2
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: LiWangLaiKai
      fonts:
        - asset: assets/fonts/LiWangLaiKai.ttf