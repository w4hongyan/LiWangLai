name: LiWangLai
options:
  bundleIdPrefix: com.liwanglai
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  LiWangLai:
    type: application
    platform: iOS
    sources:
      - path: LiWangLai
    resources:
      - path: LiWangLai/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liwanglai.app
        INFOPLIST_FILE: LiWangLai/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
        DEVELOPMENT_TEAM: "3VL637VQRM"
    info:
      path: LiWangLai/App/Info.plist
      properties:
        CFBundleDisplayName: 礼往来
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIUserInterfaceStyle: Light
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - SourceHanSerifSC-Regular.otf
          - SourceHanSerifSC-SemiBold.otf
  LiWangLaiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LiWangLaiTests
    dependencies:
      - target: LiWangLai
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.liwanglai.app.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
