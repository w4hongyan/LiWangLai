name: LiWangLai
options:
  bundleIdPrefix: com.w4hongyan.liwanglai
  deploymentTarget:
    iOS: "17.6"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "1"
targets:
  LiWangLai:
    type: application
    platform: iOS
    sources:
      - path: LiWangLai
    resources:
      - path: LiWangLai/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.changxiangai.liwanglai
        INFOPLIST_FILE: LiWangLai/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
        DEVELOPMENT_TEAM: "FGB346G6W6"
    info:
      path: LiWangLai/App/Info.plist
      properties:
        CFBundleDisplayName: 礼往来
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIUserInterfaceStyle: Light
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: 用于解锁查看你的礼簿内容
        UIAppFonts:
          - SourceHanSerifSC-Regular.otf
          - SourceHanSerifSC-SemiBold.otf
  LiWangLaiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LiWangLaiTests
    dependencies:
      - target: LiWangLai
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.changxiangai.liwanglai.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
